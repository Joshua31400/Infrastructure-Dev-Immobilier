services:
  db:
    image: mysql:8.0
    container_name: a_la_casa_db
    environment:
      MYSQL_ROOT_PASSWORD: "Pikachu22#"
      MYSQL_DATABASE: a_la_casa
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pPikachu22#"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:latest
    container_name: a_la_casa_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio_init:
    image: minio/mc:latest
    container_name: a_la_casa_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/a-la-casa &&
        mc anonymous set download local/a-la-casa
      "

  api:
    build:
      context: ../api
    container_name: a_la_casa_api
    env_file: ../api/.env
    environment:
      DB_HOST: db
      MINIO_ENDPOINT: minio
      MINIO_PUBLIC_URL: https://localhost/media
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: ../web
    container_name: a_la_casa_web
    env_file: ../web/.env
    environment:
      API_URL: https://localhost

  nginx:
    image: nginx:alpine
    container_name: a_la_casa_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - web

volumes:
  mysql_data:
  minio_data:
