global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'debian-dmz'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'windows'
    static_configs:
      - targets: ['10.0.10.10:9182']

  # NOTE: cible corrigée - 10.0.10.254 est la passerelle du VLAN 10 (Serveurs Siège),
  # donc le pfSense concerné est celui du SIEGE, pas de l'agence.
  # Si vous souhaitez aussi superviser le pfSense agence, ajouter un job distinct
  # ciblant son adresse LAN (10.1.30.254) via le tunnel VPN.
  - job_name: 'pfsense-siege'
    static_configs:
      - targets: ['10.0.10.254:9100']
