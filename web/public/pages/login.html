<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — À la Casa</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="auth-body">

  <div class="auth-container">
    <div class="auth-brand">
      <a href="/" class="logo">À<span>la</span>Casa</a>
      <p class="auth-tagline">Trouvez le bien qui vous correspond</p>
    </div>

    <div class="auth-card">
      <h1 class="auth-title">Connexion</h1>
      <form id="loginForm" class="auth-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="votre@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <div class="input-password">
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="toggle-password" id="togglePwd"></button>
          </div>
        </div>
        <div id="loginError" class="form-error" hidden></div>
        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">Se connecter</button>
      </form>
      <p class="auth-switch">Pas encore de compte ? <a href="/register">S'inscrire</a></p>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api-client.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
